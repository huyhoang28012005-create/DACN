version: '3.8'

services:
  db:
    # OWASP Rule: Sử dụng image tag cố định (v8.0.35) thay vì latest
    image: mysql:8.0.35
    container_name: lab-booking-db
    restart: always
    environment:
      # Đọc credentials trực tiếp từ file .env ngoài hệ thống, KHÔNG hardcode
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lab_management_system}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # OWASP API Security: Unrestricted Resource Consumption (Chống DoS cấp hệ thống)
    # Giới hạn RAM (512MB) và CPU (0.5 core) để ngăn DB bị nghẽn dẫn đến sập server
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    # Tự động Healthcheck để xác định Container có thực sự đang xử lý data không
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: lab-booking-redis
    restart: always
    ports:
      - "6379:6379"

  nestjs-app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab-booking-backend
    restart: always
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-123456}@db:3306/${MYSQL_DATABASE:-lab_management_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-jwt-key-dacn-lab-management-2026-secure
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  react-app:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lab-booking-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - nestjs-app

volumes:
  mysql_data: